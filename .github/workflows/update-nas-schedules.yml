name: NAS スケジュール自動更新

on:
  schedule:
    # 毎週月曜日 8:00 JST (= 日曜日 23:00 UTC) に実行
    - cron: "0 23 * * 0"
  workflow_dispatch:  # 手動実行も可能

jobs:
  update-schedules:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: 依存パッケージのインストール
        run: npm ci

      - name: Playwright ブラウザのインストール
        run: npx playwright install chromium --with-deps

      - name: NAS スケジュールをスクレイプ
        run: node scripts/scrape-hacomono-v2.js

      - name: schedules.json を更新
        run: node scripts/update-nas-schedules.js

      - name: 変更があればコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedules.json
          if git diff --cached --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "🤖 NAS スケジュール自動更新 $(date '+%Y-%m-%d')"
            git push
            echo "✅ schedules.json を更新してプッシュしました"
          fi
